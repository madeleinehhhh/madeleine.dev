name: Rebuild on CSS update

on:
  repository_dispatch:
    types: [css-updated]
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - name: Commit and push updated CSS
        run: |
          git config user.email "css-sync@madeleine.dev"
          git config user.name "CSS Sync Bot"
          git add css/shared.css
          git diff --staged --quiet || git commit -m "chore: sync shared CSS"
          git push